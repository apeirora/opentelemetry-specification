name: sync-fork
on:
  schedule:
    - cron: '4 2 * * 4,2'
  workflow_dispatch:
jobs:
  sync-fork:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check token availability
        id: check_token
        run: |
          if [ -z "$SYNC_FORK_TOKEN" ]; then
            echo "SYNC_FORK_TOKEN is not configured — skipping sync."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SYNC_FORK_TOKEN: ${{ secrets.SYNC_FORK_TOKEN }}
      - if: steps.check_token.outputs.skip == 'false'
        run: gh repo sync $REPOSITORY -b $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_FORK_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
